apiVersion: v1
kind: Service
metadata:
  name: cost-analyzer
  labels:
    app: cost-analyzer
    a2a.protocol/enabled: "true"
    a2a.protocol/version: "0.3"
  annotations:
    a2a.protocol/description: "OCI cost analysis agent — breakdown, comparison, and resource discovery"
spec:
  type: ClusterIP
  selector:
    app: cost-analyzer
  ports:
    - name: a2a
      port: 8080
      targetPort: 8080
      protocol: TCP

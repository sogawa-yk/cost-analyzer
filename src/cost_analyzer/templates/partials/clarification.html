<div class="clarification-content">
  <p class="clarification-text" x-text="msg.text"></p>
  <div class="suggestion-chips" x-show="msg.data.suggestions && msg.data.suggestions.length">
    <template x-for="suggestion in (msg.data.suggestions || [])" :key="suggestion">
      <button class="suggestion-chip"
              x-text="suggestion"
              @click="$store.app.useSuggestion(suggestion)">
      </button>
    </template>
  </div>
</div>

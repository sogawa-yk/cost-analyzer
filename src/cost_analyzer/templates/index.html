{% extends "base.html" %}
{% block content %}
<div x-data class="chat-container">
  <!-- 会話エリア -->
  <div id="chat-messages" class="chat-messages">
    <template x-for="msg in $store.app.messages" :key="msg.id">
      {% include "partials/chat-message.html" %}
    </template>

    <!-- ローディングインジケーター -->
    <div x-show="$store.app.loading" class="chat-bubble assistant-bubble typing-bubble">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- 入力エリア（固定） -->
  <div class="chat-input-area">
    <div class="chat-input-row">
      <form @submit.prevent="$store.app.submitQuery()" class="chat-form">
        <input type="text"
               x-model="$store.app.queryText"
               x-bind:placeholder="$store.i18n.t('query_placeholder')"
               maxlength="1000"
               class="chat-input"
               x-bind:disabled="$store.app.loading">
        <button type="submit"
                class="chat-send-btn"
                x-bind:disabled="!$store.app.queryText.trim() || $store.app.loading"
                x-text="$store.i18n.t('submit_button')">
        </button>
      </form>
      <button class="clear-btn"
              @click="$store.app.clearMessages()"
              x-text="$store.i18n.t('clear_conversation')"
              x-bind:disabled="$store.app.loading">
      </button>
    </div>
  </div>
</div>
{% endblock %}
